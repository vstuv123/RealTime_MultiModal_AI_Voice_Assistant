services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # remove ports entirely — backend talks to it internally
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # persist data to disk

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
    depends_on:
      - redis
    volumes:
      - ./backend:/app  # remove this in prod, dev only for hot reload

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  redis_data: